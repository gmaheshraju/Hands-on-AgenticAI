<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="820" height="380" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 6 4" refX="5" refY="2" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M0,0 L6,2 L0,4 Z" fill="#d1d5db"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 6 4" refX="5" refY="2" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M0,0 L6,2 L0,4 Z" fill="#d4622b"/>
    </marker>
  </defs>

  <!-- Column dividers -->
  <line x1="164" y1="30" x2="164" y2="350" stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="394" y1="30" x2="394" y2="350" stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="554" y1="30" x2="554" y2="350" stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="714" y1="30" x2="714" y2="350" stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1"/>

  <!-- ==================== COLUMN 1: INPUT ==================== -->
  <text x="90" y="52" font-size="10" fill="#6b7280" letter-spacing="0.05em" text-anchor="middle" font-weight="600">INPUT</text>

  <!-- User icon -->
  <circle cx="90" cy="140" r="12" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="90" y1="152" x2="90" y2="175" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="75" y1="163" x2="105" y2="163" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="90" y1="175" x2="78" y2="195" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="90" y1="175" x2="102" y2="195" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Query pill -->
  <rect x="55" y="215" width="70" height="28" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="90" y="233" font-size="11" fill="#1f2937" text-anchor="middle">Query</text>

  <!-- ==================== COLUMN 2: ORCHESTRATE ==================== -->
  <text x="280" y="52" font-size="10" fill="#6b7280" letter-spacing="0.05em" text-anchor="middle" font-weight="600">ORCHESTRATE</text>

  <!-- Hero circle -->
  <circle cx="280" cy="195" r="70" fill="none" stroke="#d4622b" stroke-width="1.5"/>

  <!-- Center label -->
  <text x="280" y="199" font-size="11" fill="#d4622b" font-weight="600" text-anchor="middle">ReAct</text>

  <!-- Observe — top (12 o'clock) -->
  <rect x="247" y="112" width="66" height="24" rx="10" fill="#fff" stroke="#d4622b" stroke-width="1"/>
  <text x="280" y="128" font-size="10" fill="#1f2937" text-anchor="middle">Observe</text>

  <!-- Think — right (3 o'clock) -->
  <rect x="338" y="183" width="52" height="24" rx="10" fill="#fff" stroke="#d4622b" stroke-width="1"/>
  <text x="364" y="199" font-size="10" fill="#1f2937" text-anchor="middle">Think</text>

  <!-- Act — bottom (6 o'clock) -->
  <rect x="260" y="254" width="40" height="24" rx="10" fill="#fff" stroke="#d4622b" stroke-width="1"/>
  <text x="280" y="270" font-size="10" fill="#1f2937" text-anchor="middle">Act</text>

  <!-- Evaluate — left (9 o'clock) -->
  <rect x="190" y="183" width="66" height="24" rx="10" fill="#fff" stroke="#d4622b" stroke-width="1"/>
  <text x="223" y="199" font-size="10" fill="#1f2937" text-anchor="middle">Evaluate</text>

  <!-- Connection dots -->
  <circle cx="280" cy="125" r="2" fill="#d4622b"/>
  <circle cx="350" cy="195" r="2" fill="#d4622b"/>
  <circle cx="280" cy="265" r="2" fill="#d4622b"/>
  <circle cx="210" cy="195" r="2" fill="#d4622b"/>

  <!-- Clockwise curved arrows: Observe → Think -->
  <path d="M313,130 C335,135 345,160 348,183" fill="none" stroke="#d4622b" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- Think → Act -->
  <path d="M348,207 C345,235 335,255 313,265" fill="none" stroke="#d4622b" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- Act → Evaluate -->
  <path d="M260,268 C240,265 225,245 218,207" fill="none" stroke="#d4622b" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- Evaluate → Observe -->
  <path d="M218,183 C225,155 240,135 260,125" fill="none" stroke="#d4622b" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- ==================== COLUMN 3: RETRIEVE ==================== -->
  <text x="480" y="52" font-size="10" fill="#6b7280" letter-spacing="0.05em" text-anchor="middle" font-weight="600">RETRIEVE</text>

  <!-- Vector DB pill -->
  <rect x="435" y="150" width="90" height="28" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="480" y="168" font-size="10" fill="#1f2937" text-anchor="middle">Vector DB</text>

  <!-- Documents pill -->
  <rect x="435" y="194" width="90" height="28" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="480" y="212" font-size="10" fill="#1f2937" text-anchor="middle">Documents</text>

  <!-- Embeddings pill -->
  <rect x="435" y="238" width="90" height="28" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="480" y="256" font-size="10" fill="#1f2937" text-anchor="middle">Embeddings</text>

  <!-- ==================== COLUMN 4: GENERATE ==================== -->
  <text x="634" y="52" font-size="10" fill="#6b7280" letter-spacing="0.05em" text-anchor="middle" font-weight="600">GENERATE</text>

  <!-- LLM box -->
  <rect x="598" y="170" width="72" height="34" rx="8" fill="#f3f4f6" stroke="#d4622b" stroke-width="1"/>
  <text x="634" y="192" font-size="13" fill="#1f2937" font-weight="600" text-anchor="middle">LLM</text>

  <!-- Guardrails pill -->
  <rect x="594" y="222" width="80" height="24" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="634" y="238" font-size="9" fill="#6b7280" text-anchor="middle">Guardrails</text>

  <!-- Format pill -->
  <rect x="604" y="258" width="60" height="24" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="634" y="274" font-size="9" fill="#6b7280" text-anchor="middle">Format</text>

  <!-- ==================== COLUMN 5: OUTPUT ==================== -->
  <text x="764" y="52" font-size="10" fill="#6b7280" letter-spacing="0.05em" text-anchor="middle" font-weight="600">OUTPUT</text>

  <!-- Response pill -->
  <rect x="726" y="175" width="76" height="28" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="764" y="193" font-size="10" fill="#1f2937" text-anchor="middle">Response</text>

  <!-- Citations pill -->
  <rect x="730" y="219" width="68" height="24" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="764" y="235" font-size="9" fill="#6b7280" text-anchor="middle">Citations</text>

  <!-- ==================== CONNECTIONS ==================== -->

  <!-- INPUT → ORCHESTRATE (Query → Observe) -->
  <path d="M125,229 C150,229 170,180 200,150 C220,130 240,125 247,124" fill="none" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ORCHESTRATE (Act) → RETRIEVE -->
  <path d="M300,266 C340,266 390,220 435,195" fill="none" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RETRIEVE → GENERATE -->
  <path d="M525,208 C550,200 570,192 598,189" fill="none" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- GENERATE → OUTPUT -->
  <path d="M670,189 C690,189 710,189 726,189" fill="none" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrow)"/>

</svg>