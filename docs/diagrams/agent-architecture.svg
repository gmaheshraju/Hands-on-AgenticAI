<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#e07a3a"/>
    </marker>
    <marker id="arrow1g" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Section: Input Layer -->
  <rect x="10" y="10" width="130" height="420" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="75" y="32" fill="#3b82f6" font-size="11" font-weight="bold" text-anchor="middle">INPUT</text>

  <rect x="25" y="50" width="100" height="50" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="72" fill="#e0e0e0" font-size="11" text-anchor="middle">User Query</text>
  <text x="75" y="88" fill="#888" font-size="9" text-anchor="middle">NL / API call</text>

  <rect x="25" y="120" width="100" height="50" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="142" fill="#e0e0e0" font-size="11" text-anchor="middle">API Gateway</text>
  <text x="75" y="158" fill="#888" font-size="9" text-anchor="middle">Auth + Rate Limit</text>

  <!-- Arrow: Input to Orchestration -->
  <line x1="135" y1="145" x2="160" y2="145" stroke="#e07a3a" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Section: Orchestration -->
  <rect x="155" y="10" width="200" height="420" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#e07a3a" stroke-width="1"/>
  <text x="255" y="32" fill="#e07a3a" font-size="11" font-weight="bold" text-anchor="middle">ORCHESTRATION</text>

  <rect x="170" y="50" width="170" height="40" rx="8" fill="#e07a3a" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="255" y="75" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">Router / Orchestrator</text>

  <!-- ReAct Loop -->
  <rect x="170" y="110" width="170" height="180" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="255" y="130" fill="#e07a3a" font-size="10" font-weight="bold" text-anchor="middle">ReAct Loop</text>

  <rect x="185" y="140" width="140" height="30" rx="6" fill="#2d2d4e" stroke="#4ecdc4" stroke-width="1"/>
  <text x="255" y="160" fill="#4ecdc4" font-size="10" text-anchor="middle">OBSERVE</text>

  <path d="M 255 170 L 255 180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow1g)"/>

  <rect x="185" y="185" width="140" height="30" rx="6" fill="#2d2d4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="255" y="205" fill="#8b5cf6" font-size="10" text-anchor="middle">THINK (LLM Inference)</text>

  <path d="M 255 215 L 255 225" stroke="#888" stroke-width="1.5" marker-end="url(#arrow1g)"/>

  <rect x="185" y="230" width="140" height="30" rx="6" fill="#2d2d4e" stroke="#e07a3a" stroke-width="1"/>
  <text x="255" y="250" fill="#e07a3a" font-size="10" text-anchor="middle">ACT (Tool Dispatch)</text>

  <path d="M 255 260 L 255 270" stroke="#888" stroke-width="1.5" marker-end="url(#arrow1g)"/>

  <rect x="185" y="275" width="140" height="30" rx="6" fill="#2d2d4e" stroke="#3b82f6" stroke-width="1"/>
  <text x="255" y="295" fill="#3b82f6" font-size="10" text-anchor="middle">EVALUATE</text>

  <!-- Loop arrow back -->
  <path d="M 170 290 L 160 290 L 160 145 L 170 145" stroke="#888" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#arrow1g)"/>

  <!-- Termination -->
  <rect x="170" y="320" width="170" height="40" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="255" y="345" fill="#4ecdc4" font-size="10" text-anchor="middle">Termination / Max Iters</text>

  <!-- Section: Retrieval -->
  <rect x="370" y="10" width="160" height="200" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#4ecdc4" stroke-width="1"/>
  <text x="450" y="32" fill="#4ecdc4" font-size="11" font-weight="bold" text-anchor="middle">RETRIEVAL (RAG)</text>

  <rect x="385" y="50" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="450" y="72" fill="#e0e0e0" font-size="10" text-anchor="middle">Vector DB</text>

  <rect x="385" y="95" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="450" y="117" fill="#e0e0e0" font-size="10" text-anchor="middle">Document Store</text>

  <rect x="385" y="140" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="450" y="162" fill="#e0e0e0" font-size="10" text-anchor="middle">Embeddings Model</text>

  <!-- Arrow: Orchestrator to Retrieval -->
  <line x1="340" y1="70" x2="380" y2="70" stroke="#e07a3a" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Section: Tools -->
  <rect x="370" y="220" width="160" height="200" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="450" y="242" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">TOOLS</text>

  <rect x="385" y="255" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="277" fill="#e0e0e0" font-size="10" text-anchor="middle">Function Calling</text>

  <rect x="385" y="300" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="322" fill="#e0e0e0" font-size="10" text-anchor="middle">API Integrations</text>

  <rect x="385" y="345" width="130" height="35" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="367" fill="#e0e0e0" font-size="10" text-anchor="middle">Code Execution</text>

  <!-- Arrow: Orchestrator to Tools -->
  <line x1="340" y1="250" x2="380" y2="310" stroke="#e07a3a" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Section: Generation -->
  <rect x="550" y="10" width="140" height="200" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="620" y="32" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">GENERATION</text>

  <rect x="565" y="50" width="110" height="35" rx="8" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="72" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">LLM</text>

  <rect x="565" y="95" width="110" height="35" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="117" fill="#e0e0e0" font-size="10" text-anchor="middle">Guardrails</text>

  <rect x="565" y="140" width="110" height="35" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="162" fill="#e0e0e0" font-size="10" text-anchor="middle">Formatting</text>

  <!-- Arrow: Retrieval to Generation -->
  <line x1="520" y1="70" x2="560" y2="70" stroke="#e07a3a" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Section: Output -->
  <rect x="710" y="30" width="100" height="170" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#4ecdc4" stroke-width="1"/>
  <text x="760" y="52" fill="#4ecdc4" font-size="11" font-weight="bold" text-anchor="middle">OUTPUT</text>

  <rect x="720" y="65" width="80" height="40" rx="8" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="760" y="90" fill="#1a1a2e" font-size="10" font-weight="bold" text-anchor="middle">Response</text>

  <rect x="720" y="115" width="80" height="30" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="760" y="135" fill="#e0e0e0" font-size="9" text-anchor="middle">Citations</text>

  <rect x="720" y="155" width="80" height="30" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="760" y="175" fill="#e0e0e0" font-size="9" text-anchor="middle">Artifacts</text>

  <!-- Arrow: Generation to Output -->
  <line x1="680" y1="85" x2="715" y2="85" stroke="#e07a3a" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Section: Observability (bottom bar) -->
  <rect x="550" y="230" width="260" height="190" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#888" stroke-width="1"/>
  <text x="680" y="252" fill="#888" font-size="11" font-weight="bold" text-anchor="middle">OBSERVABILITY</text>

  <rect x="565" y="265" width="110" height="30" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="620" y="285" fill="#e0e0e0" font-size="10" text-anchor="middle">Tracing</text>

  <rect x="690" y="265" width="110" height="30" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="745" y="285" fill="#e0e0e0" font-size="10" text-anchor="middle">Metrics</text>

  <rect x="565" y="305" width="110" height="30" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="620" y="325" fill="#e0e0e0" font-size="10" text-anchor="middle">Cost Tracking</text>

  <rect x="690" y="305" width="110" height="30" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="745" y="325" fill="#e0e0e0" font-size="10" text-anchor="middle">Evals</text>

  <rect x="565" y="345" width="235" height="30" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="682" y="365" fill="#e0e0e0" font-size="10" text-anchor="middle">Langfuse / LangSmith / Braintrust</text>

  <!-- Dashed lines from orchestrator to observability -->
  <line x1="340" y1="345" x2="560" y2="360" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
</svg>