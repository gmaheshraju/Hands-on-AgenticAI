<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ah-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#e07a3a"/>
    </marker>
    <marker id="ah-arrowg" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">Agent Harness &amp; Loop Engineering</text>
  <line x1="150" y1="34" x2="670" y2="34" stroke="#888" stroke-width="0.5"/>

  <!-- Tracing wrapper (outermost layer) -->
  <rect x="10" y="42" width="800" height="390" rx="12" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="25" y="60" fill="#888" font-size="10" font-weight="bold">TRACING LAYER (Langfuse / LangSmith)</text>
  <text x="780" y="60" fill="#888" font-size="9" text-anchor="end">spans, tokens, latency, cost</text>

  <!-- Main Loop Area -->
  <rect x="30" y="70" width="760" height="240" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="410" y="90" fill="#e07a3a" font-size="12" font-weight="bold" text-anchor="middle">AGENT LOOP (iteration 1..N)</text>

  <!-- Step 1: OBSERVE -->
  <rect x="50" y="105" width="155" height="90" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="127" y="125" fill="#4ecdc4" font-size="13" font-weight="bold" text-anchor="middle">1. OBSERVE</text>
  <text x="127" y="143" fill="#e0e0e0" font-size="9" text-anchor="middle">Load context window</text>
  <text x="127" y="157" fill="#888" font-size="9" text-anchor="middle">+ Retrieve memories</text>
  <text x="127" y="171" fill="#888" font-size="9" text-anchor="middle">+ Inject tool results</text>
  <text x="127" y="185" fill="#888" font-size="9" text-anchor="middle">+ System prompt</text>

  <!-- Arrow 1->2 -->
  <line x1="210" y1="150" x2="240" y2="150" stroke="#e07a3a" stroke-width="2" marker-end="url(#ah-arrow)"/>

  <!-- Step 2: THINK -->
  <rect x="245" y="105" width="155" height="90" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="322" y="125" fill="#8b5cf6" font-size="13" font-weight="bold" text-anchor="middle">2. THINK</text>
  <text x="322" y="143" fill="#e0e0e0" font-size="9" text-anchor="middle">LLM inference call</text>
  <text x="322" y="157" fill="#888" font-size="9" text-anchor="middle">+ Chain of thought</text>
  <text x="322" y="171" fill="#888" font-size="9" text-anchor="middle">+ Tool selection</text>
  <text x="322" y="185" fill="#888" font-size="9" text-anchor="middle">+ Parameter generation</text>

  <!-- Arrow 2->3 -->
  <line x1="405" y1="150" x2="435" y2="150" stroke="#e07a3a" stroke-width="2" marker-end="url(#ah-arrow)"/>

  <!-- Step 3: ACT -->
  <rect x="440" y="105" width="155" height="90" rx="8" fill="#e07a3a" stroke="#e07a3a" stroke-width="2"/>
  <text x="517" y="125" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">3. ACT</text>
  <text x="517" y="143" fill="#fff" font-size="9" text-anchor="middle">Execute tool call</text>
  <text x="517" y="157" fill="rgba(255,255,255,0.8)" font-size="9" text-anchor="middle">+ Sandbox / permissions</text>
  <text x="517" y="171" fill="rgba(255,255,255,0.8)" font-size="9" text-anchor="middle">+ Error handling</text>
  <text x="517" y="185" fill="rgba(255,255,255,0.8)" font-size="9" text-anchor="middle">+ Collect observation</text>

  <!-- Arrow 3->4 -->
  <line x1="600" y1="150" x2="630" y2="150" stroke="#e07a3a" stroke-width="2" marker-end="url(#ah-arrow)"/>

  <!-- Step 4: EVALUATE -->
  <rect x="635" y="105" width="140" height="90" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="2"/>
  <text x="705" y="125" fill="#3b82f6" font-size="13" font-weight="bold" text-anchor="middle">4. EVALUATE</text>
  <text x="705" y="143" fill="#e0e0e0" font-size="9" text-anchor="middle">Task complete?</text>
  <text x="705" y="157" fill="#888" font-size="9" text-anchor="middle">+ Quality check</text>
  <text x="705" y="171" fill="#888" font-size="9" text-anchor="middle">+ Convergence test</text>
  <text x="705" y="185" fill="#888" font-size="9" text-anchor="middle">+ Continue / Stop</text>

  <!-- Loop-back arrow (EVALUATE -> OBSERVE) -->
  <path d="M 705 200 L 705 220 Q 705 235 690 235 L 140 235 Q 127 235 127 220 L 127 200" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#ah-arrowg)"/>
  <text x="410" y="250" fill="#888" font-size="10" text-anchor="middle">Loop back if not converged</text>

  <!-- Exit arrow from EVALUATE -->
  <line x1="775" y1="150" x2="800" y2="150" stroke="#4ecdc4" stroke-width="2" marker-end="url(#ah-arrow)"/>
  <text x="788" y="140" fill="#4ecdc4" font-size="8" text-anchor="middle">done</text>

  <!-- Gates Section -->
  <rect x="30" y="270" width="370" height="150" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="290" fill="#3b82f6" font-size="12" font-weight="bold" text-anchor="middle">TERMINATION GATES</text>

  <rect x="45" y="300" width="160" height="35" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="125" y="322" fill="#e0e0e0" font-size="10" text-anchor="middle">Iteration Cap (max_iters)</text>

  <rect x="220" y="300" width="165" height="35" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="302" y="322" fill="#e0e0e0" font-size="10" text-anchor="middle">Cost Cap (max_tokens $)</text>

  <rect x="45" y="345" width="160" height="35" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="125" y="367" fill="#e0e0e0" font-size="10" text-anchor="middle">Convergence Detection</text>

  <rect x="220" y="345" width="165" height="35" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="302" y="367" fill="#e0e0e0" font-size="10" text-anchor="middle">LLM says "done"</text>

  <rect x="45" y="390" width="340" height="22" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="215" y="405" fill="#888" font-size="9" text-anchor="middle">Error threshold: 3 consecutive failures = abort</text>

  <!-- Error Recovery Section -->
  <rect x="420" y="270" width="370" height="150" rx="10" fill="#1a1a2e" opacity="0.3" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="605" y="290" fill="#e07a3a" font-size="12" font-weight="bold" text-anchor="middle">ERROR RECOVERY</text>

  <rect x="435" y="300" width="165" height="35" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1"/>
  <text x="517" y="315" fill="#e0e0e0" font-size="10" text-anchor="middle">Retry with backoff</text>
  <text x="517" y="328" fill="#888" font-size="8" text-anchor="middle">Transient API errors</text>

  <rect x="615" y="300" width="160" height="35" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1"/>
  <text x="695" y="315" fill="#e0e0e0" font-size="10" text-anchor="middle">Fallback model</text>
  <text x="695" y="328" fill="#888" font-size="8" text-anchor="middle">Opus -> Sonnet -> Haiku</text>

  <rect x="435" y="345" width="165" height="35" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1"/>
  <text x="517" y="360" fill="#e0e0e0" font-size="10" text-anchor="middle">Tool error injection</text>
  <text x="517" y="373" fill="#888" font-size="8" text-anchor="middle">Feed error back as context</text>

  <rect x="615" y="345" width="160" height="35" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1"/>
  <text x="695" y="360" fill="#e0e0e0" font-size="10" text-anchor="middle">Human escalation</text>
  <text x="695" y="373" fill="#888" font-size="8" text-anchor="middle">Ask user for guidance</text>

  <rect x="435" y="390" width="340" height="22" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="605" y="405" fill="#888" font-size="9" text-anchor="middle">Structured error classes: Retriable | Fatal | NeedsHuman</text>
</svg>