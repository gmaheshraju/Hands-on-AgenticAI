<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ah-arrow" viewBox="0 0 6 4" refX="6" refY="2" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 6 2 L 0 4 z" fill="#0d9488"/>
    </marker>
    <marker id="ah-arrow-gray" viewBox="0 0 6 4" refX="6" refY="2" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 6 2 L 0 4 z" fill="#d1d5db"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="380" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Trace Span dashed wrapper around the loop -->
  <rect x="245" y="58" width="270" height="270" rx="8" fill="none" stroke="#d1d5db" stroke-width="0.75" stroke-dasharray="4,4"/>
  <text x="380" y="340" fill="#6b7280" font-size="8" text-anchor="middle">trace span</text>

  <!-- Guide circle -->
  <circle cx="380" cy="190" r="90" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Center label -->
  <text x="380" y="187" fill="#1f2937" font-size="11" font-weight="600" text-anchor="middle">Agent Loop</text>
  <text x="380" y="200" fill="#6b7280" font-size="8" text-anchor="middle">n iterations</text>

  <!-- OBSERVE node (12 o'clock) -->
  <rect x="340" y="82" width="80" height="28" rx="12" fill="#fff" stroke="#0d9488" stroke-width="1"/>
  <text x="380" y="101" fill="#0d9488" font-size="10" font-weight="600" text-anchor="middle">OBSERVE</text>

  <!-- THINK node (3 o'clock) -->
  <rect x="440" y="176" width="62" height="28" rx="12" fill="#fff" stroke="#0d9488" stroke-width="1"/>
  <text x="471" y="195" fill="#0d9488" font-size="10" font-weight="600" text-anchor="middle">THINK</text>

  <!-- ACT node (6 o'clock) -->
  <rect x="355" y="268" width="50" height="28" rx="12" fill="#fff" stroke="#0d9488" stroke-width="1"/>
  <text x="380" y="287" fill="#0d9488" font-size="10" font-weight="600" text-anchor="middle">ACT</text>

  <!-- EVALUATE node (9 o'clock) -->
  <rect x="248" y="176" width="80" height="28" rx="12" fill="#fff" stroke="#0d9488" stroke-width="1"/>
  <text x="288" y="195" fill="#0d9488" font-size="10" font-weight="600" text-anchor="middle">EVALUATE</text>

  <!-- Curved arrows: OBSERVE -> THINK (top-right quadrant, clockwise) -->
  <circle cx="405" cy="115" r="1.5" fill="#0d9488"/>
  <path d="M 407 117 C 435 135, 455 155, 455 174" stroke="#0d9488" stroke-width="1" fill="none" marker-end="url(#ah-arrow)"/>

  <!-- THINK -> ACT (bottom-right quadrant, clockwise) -->
  <circle cx="460" cy="206" r="1.5" fill="#0d9488"/>
  <path d="M 458 208 C 448 235, 425 258, 405 268" stroke="#0d9488" stroke-width="1" fill="none" marker-end="url(#ah-arrow)"/>

  <!-- ACT -> EVALUATE (bottom-left quadrant, clockwise) -->
  <circle cx="355" cy="290" r="1.5" fill="#0d9488"/>
  <path d="M 353 288 C 330 270, 310 240, 305 206" stroke="#0d9488" stroke-width="1" fill="none" marker-end="url(#ah-arrow)"/>

  <!-- EVALUATE -> OBSERVE (top-left quadrant, clockwise) -->
  <circle cx="300" cy="176" r="1.5" fill="#0d9488"/>
  <path d="M 302 174 C 310 148, 335 120, 355 112" stroke="#0d9488" stroke-width="1" fill="none" marker-end="url(#ah-arrow)"/>

  <!-- ==================== SURROUNDING ELEMENTS ==================== -->

  <!-- Top-right: Termination Gates -->
  <rect x="560" y="40" width="220" height="118" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="580" y="60" fill="#1f2937" font-size="10" font-weight="600">Termination Gates</text>
  <circle cx="575" cy="78" r="2" fill="#d1d5db"/>
  <text x="584" y="82" fill="#6b7280" font-size="9">iteration cap</text>
  <circle cx="575" cy="96" r="2" fill="#d1d5db"/>
  <text x="584" y="100" fill="#6b7280" font-size="9">cost cap</text>
  <circle cx="575" cy="114" r="2" fill="#d1d5db"/>
  <text x="584" y="118" fill="#6b7280" font-size="9">convergence</text>
  <circle cx="575" cy="132" r="2" fill="#d1d5db"/>
  <text x="584" y="136" fill="#6b7280" font-size="9">stop signal</text>
  <!-- Dashed line from Termination Gates to loop -->
  <path d="M 560 98 L 510 150 Q 500 160, 490 170" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="3,3" fill="none"/>

  <!-- Bottom-right: Tool Execution -->
  <rect x="560" y="230" width="220" height="90" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="580" y="252" fill="#1f2937" font-size="10" font-weight="600">Tool Execution</text>
  <rect x="580" y="264" width="52" height="20" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="606" y="278" fill="#6b7280" font-size="9" text-anchor="middle">retry</text>
  <rect x="644" y="264" width="64" height="20" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="676" y="278" fill="#6b7280" font-size="9" text-anchor="middle">fallback</text>
  <text x="580" y="305" fill="#6b7280" font-size="8">Sandboxed tool calls with</text>
  <text x="580" y="314" fill="#6b7280" font-size="8">error handling and retries</text>
  <!-- Dashed line from Tool Execution to ACT -->
  <path d="M 560 275 L 510 280 Q 470 282, 408 282" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="3,3" fill="none"/>

  <!-- Left: Memory Injection -->
  <text x="60" y="140" fill="#6b7280" font-size="10" font-weight="600">Memory</text>
  <text x="60" y="154" fill="#6b7280" font-size="10" font-weight="600">Injection</text>
  <text x="60" y="170" fill="#6b7280" font-size="8">system prompt</text>
  <text x="60" y="181" fill="#6b7280" font-size="8">retrieved context</text>
  <text x="60" y="192" fill="#6b7280" font-size="8">conversation history</text>
  <!-- Curved arrow from Memory to OBSERVE -->
  <path d="M 130 148 C 180 128, 260 98, 338 96" stroke="#0d9488" stroke-width="1" fill="none" marker-end="url(#ah-arrow)"/>
  <circle cx="130" cy="148" r="1.5" fill="#0d9488"/>
</svg>