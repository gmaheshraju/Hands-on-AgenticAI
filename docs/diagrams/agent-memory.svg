<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="am-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#e07a3a"/>
    </marker>
    <marker id="am-arrowg" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">Agent Memory Architecture</text>
  <line x1="150" y1="38" x2="670" y2="38" stroke="#888" stroke-width="0.5"/>

  <!-- Tier 1: Working Memory -->
  <rect x="15" y="55" width="790" height="95" rx="10" fill="#1a1a2e" opacity="0.4" stroke="#e07a3a" stroke-width="2"/>
  <text x="30" y="75" fill="#e07a3a" font-size="12" font-weight="bold">WORKING MEMORY</text>
  <text x="200" y="75" fill="#888" font-size="10">(Context Window — ephemeral, per-request)</text>

  <rect x="30" y="85" width="150" height="50" rx="8" fill="#e07a3a" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="105" y="107" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">System Prompt</text>
  <text x="105" y="121" fill="#fff" font-size="9" text-anchor="middle">Role + Rules</text>

  <rect x="195" y="85" width="150" height="50" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="270" y="107" fill="#e0e0e0" font-size="10" text-anchor="middle">Retrieved Memories</text>
  <text x="270" y="121" fill="#888" font-size="9" text-anchor="middle">Injected at prompt time</text>

  <rect x="360" y="85" width="150" height="50" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="435" y="107" fill="#e0e0e0" font-size="10" text-anchor="middle">Conversation</text>
  <text x="435" y="121" fill="#888" font-size="9" text-anchor="middle">Current turn messages</text>

  <rect x="525" y="85" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="590" y="107" fill="#e0e0e0" font-size="10" text-anchor="middle">Tool Results</text>
  <text x="590" y="121" fill="#888" font-size="9" text-anchor="middle">Observation data</text>

  <rect x="670" y="85" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="730" y="107" fill="#e0e0e0" font-size="10" text-anchor="middle">Scratchpad</text>
  <text x="730" y="121" fill="#888" font-size="9" text-anchor="middle">Thinking / CoT</text>

  <!-- Arrow down -->
  <path d="M 410 150 L 410 168" stroke="#e07a3a" stroke-width="2" marker-end="url(#am-arrow)"/>
  <text x="430" y="163" fill="#888" font-size="9">eviction</text>

  <!-- Tier 2: Short-Term Memory -->
  <rect x="15" y="170" width="790" height="95" rx="10" fill="#1a1a2e" opacity="0.4" stroke="#4ecdc4" stroke-width="2"/>
  <text x="30" y="190" fill="#4ecdc4" font-size="12" font-weight="bold">SHORT-TERM MEMORY</text>
  <text x="225" y="190" fill="#888" font-size="10">(Session-scoped — survives turns, not restarts)</text>

  <rect x="30" y="200" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="115" y="222" fill="#e0e0e0" font-size="10" text-anchor="middle">Conversation Buffer</text>
  <text x="115" y="236" fill="#888" font-size="9" text-anchor="middle">Full message history</text>

  <rect x="215" y="200" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="300" y="222" fill="#e0e0e0" font-size="10" text-anchor="middle">Sliding Window</text>
  <text x="300" y="236" fill="#888" font-size="9" text-anchor="middle">Last N turns (e.g. 20)</text>

  <rect x="400" y="200" width="170" height="50" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="485" y="222" fill="#e0e0e0" font-size="10" text-anchor="middle">Summarization</text>
  <text x="485" y="236" fill="#888" font-size="9" text-anchor="middle">Compress old turns</text>

  <rect x="585" y="200" width="205" height="50" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="687" y="222" fill="#e0e0e0" font-size="10" text-anchor="middle">Entity / Topic Tracker</text>
  <text x="687" y="236" fill="#888" font-size="9" text-anchor="middle">Key facts from this session</text>

  <!-- Arrow down -->
  <path d="M 410 265 L 410 283" stroke="#e07a3a" stroke-width="2" marker-end="url(#am-arrow)"/>
  <text x="430" y="278" fill="#888" font-size="9">consolidation</text>

  <!-- Tier 3: Long-Term Memory -->
  <rect x="15" y="285" width="790" height="145" rx="10" fill="#1a1a2e" opacity="0.4" stroke="#8b5cf6" stroke-width="2"/>
  <text x="30" y="305" fill="#8b5cf6" font-size="12" font-weight="bold">LONG-TERM MEMORY</text>
  <text x="215" y="305" fill="#888" font-size="10">(Persistent — survives restarts and sessions)</text>

  <!-- Three sub-types -->
  <rect x="30" y="315" width="220" height="100" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="335" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">Procedural</text>
  <text x="140" y="353" fill="#e0e0e0" font-size="10" text-anchor="middle">SKILL.md / CLAUDE.md</text>
  <text x="140" y="368" fill="#888" font-size="9" text-anchor="middle">Rules, workflows, patterns</text>
  <text x="140" y="383" fill="#888" font-size="9" text-anchor="middle">"How to do X"</text>
  <text x="140" y="400" fill="#4ecdc4" font-size="9" text-anchor="middle">Curated by human</text>

  <rect x="265" y="315" width="230" height="100" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="380" y="335" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">Semantic</text>
  <text x="380" y="353" fill="#e0e0e0" font-size="10" text-anchor="middle">Vector DB (embeddings)</text>
  <text x="380" y="368" fill="#888" font-size="9" text-anchor="middle">Facts, knowledge, preferences</text>
  <text x="380" y="383" fill="#888" font-size="9" text-anchor="middle">"What I know about X"</text>
  <text x="380" y="400" fill="#4ecdc4" font-size="9" text-anchor="middle">Retrieved by similarity</text>

  <rect x="510" y="315" width="280" height="100" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="650" y="335" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">Episodic</text>
  <text x="650" y="353" fill="#e0e0e0" font-size="10" text-anchor="middle">Dated session logs / transcripts</text>
  <text x="650" y="368" fill="#888" font-size="9" text-anchor="middle">"What happened on June 15"</text>
  <text x="650" y="383" fill="#888" font-size="9" text-anchor="middle">Raw experience, timestamped</text>
  <text x="650" y="400" fill="#4ecdc4" font-size="9" text-anchor="middle">Distilled into Semantic over time</text>

  <!-- Consolidation arrow from Episodic to Semantic -->
  <path d="M 520 370 L 500 370" stroke="#e07a3a" stroke-width="2" marker-end="url(#am-arrow)" stroke-dasharray="5,3"/>
  <text x="470" y="365" fill="#e07a3a" font-size="8" text-anchor="middle">distill</text>

  <!-- Key insight callout -->
  <rect x="565" y="55" width="230" height="30" rx="15" fill="#e07a3a" opacity="0.15" stroke="#e07a3a" stroke-width="1"/>
  <text x="680" y="74" fill="#e07a3a" font-size="9" font-weight="bold" text-anchor="middle">KEY: Episodes distill into facts</text>
</svg>