<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 6 4" refX="5" refY="2" markerWidth="6" markerHeight="4" orient="auto-start-reverse">
      <path d="M0,0 L6,2 L0,4 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="360" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ═══ DEPTH SCALE (left edge) ═══ -->
  <line x1="55" y1="55" x2="55" y2="320" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Dots -->
  <circle cx="55" cy="80" r="2.5" fill="#d1d5db"/>
  <circle cx="55" cy="180" r="2.5" fill="#d1d5db"/>
  <circle cx="55" cy="285" r="2.5" fill="#d1d5db"/>
  <!-- Labels -->
  <text x="50" y="83" font-size="9" fill="#6b7280" letter-spacing="0.05em" text-anchor="end">Ephemeral</text>
  <text x="50" y="183" font-size="9" fill="#6b7280" letter-spacing="0.05em" text-anchor="end">Session</text>
  <text x="50" y="288" font-size="9" fill="#6b7280" letter-spacing="0.05em" text-anchor="end">Persistent</text>

  <!-- ═══ VERTICAL DASHED CONNECTIONS ═══ -->
  <line x1="300" y1="120" x2="300" y2="140" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="120" x2="440" y2="140" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="120" x2="580" y2="140" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>

  <line x1="300" y1="220" x2="300" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="220" x2="440" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="220" x2="580" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ TIER 1 — WORKING MEMORY ═══ -->
  <rect x="100" y="40" width="680" height="80" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="120" y="58" font-size="10" fill="#6b7280" letter-spacing="0.05em" font-weight="600">WORKING MEMORY</text>

  <!-- Pill: System Prompt -->
  <rect x="160" y="70" width="120" height="32" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="220" y="90" font-size="11" fill="#1f2937" text-anchor="middle">System Prompt</text>

  <!-- Pill: Conversation -->
  <rect x="310" y="70" width="120" height="32" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="370" y="90" font-size="11" fill="#1f2937" text-anchor="middle">Conversation</text>

  <!-- Pill: Tool Results -->
  <rect x="460" y="70" width="120" height="32" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="520" y="90" font-size="11" fill="#1f2937" text-anchor="middle">Tool Results</text>

  <!-- ═══ TIER 2 — SHORT-TERM MEMORY ═══ -->
  <rect x="100" y="140" width="680" height="80" rx="8" fill="#f0f4ff" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="120" y="158" font-size="10" fill="#6b7280" letter-spacing="0.05em" font-weight="600">SHORT-TERM MEMORY</text>

  <!-- Pill: Buffer -->
  <rect x="160" y="170" width="120" height="32" rx="10" fill="#fff" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="220" y="190" font-size="11" fill="#1f2937" text-anchor="middle">Buffer</text>

  <!-- Pill: Window -->
  <rect x="310" y="170" width="120" height="32" rx="10" fill="#fff" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="370" y="190" font-size="11" fill="#1f2937" text-anchor="middle">Window</text>

  <!-- Pill: Summary -->
  <rect x="460" y="170" width="120" height="32" rx="10" fill="#fff" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="520" y="190" font-size="11" fill="#1f2937" text-anchor="middle">Summary</text>

  <!-- ═══ TIER 3 — LONG-TERM MEMORY ═══ -->
  <rect x="100" y="240" width="680" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="0.75"/>
  <text x="120" y="258" font-size="10" fill="#6b7280" letter-spacing="0.05em" font-weight="600">LONG-TERM MEMORY</text>

  <!-- Sub-box: Procedural -->
  <rect x="150" y="270" width="130" height="44" rx="8" fill="#fff" stroke="#2563eb" stroke-width="0.5"/>
  <text x="215" y="288" font-size="11" fill="#1f2937" text-anchor="middle" font-weight="600">Procedural</text>
  <text x="215" y="302" font-size="8" fill="#6b7280" text-anchor="middle">SKILL.md</text>

  <!-- Sub-box: Semantic -->
  <rect x="330" y="270" width="130" height="44" rx="8" fill="#fff" stroke="#2563eb" stroke-width="0.5"/>
  <text x="395" y="288" font-size="11" fill="#1f2937" text-anchor="middle" font-weight="600">Semantic</text>
  <text x="395" y="302" font-size="8" fill="#6b7280" text-anchor="middle">Vector DB</text>

  <!-- Sub-box: Episodic -->
  <rect x="510" y="270" width="130" height="44" rx="8" fill="#fff" stroke="#2563eb" stroke-width="0.5"/>
  <text x="575" y="288" font-size="11" fill="#1f2937" text-anchor="middle" font-weight="600">Episodic</text>
  <text x="575" y="302" font-size="8" fill="#6b7280" text-anchor="middle">Logs</text>

  <!-- ═══ HERO — Consolidation Gate Arrow ═══ -->
  <!-- Dot at Episodic (start) -->
  <circle cx="510" cy="292" r="2.5" fill="#2563eb"/>
  <!-- Curved arrow from Episodic to Semantic -->
  <path d="M 510,292 C 488,255 478,255 460,292" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Dot at Semantic (end) -->
  <circle cx="460" cy="292" r="2.5" fill="#2563eb"/>
  <!-- Label pill on the arrow -->
  <rect x="441" y="248" width="106" height="18" rx="6" fill="#2563eb"/>
  <text x="494" y="260" font-size="8" fill="#fff" text-anchor="middle" font-weight="600">consolidation gate</text>
</svg>