<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="rp-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#e07a3a"/>
    </marker>
    <marker id="rp-arrowg" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#888"/>
    </marker>
    <marker id="rp-arrowt" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#4ecdc4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">RAG Pipeline — End to End</text>
  <line x1="200" y1="34" x2="620" y2="34" stroke="#888" stroke-width="0.5"/>

  <!-- ========== INGESTION PIPELINE (Top) ========== -->
  <rect x="10" y="42" width="800" height="155" rx="10" fill="#1a1a2e" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="25" y="62" fill="#3b82f6" font-size="12" font-weight="bold">INGESTION PIPELINE</text>
  <text x="220" y="62" fill="#888" font-size="9">(offline, batch or streaming)</text>

  <!-- Documents -->
  <rect x="25" y="75" width="100" height="60" rx="8" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="97" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">Documents</text>
  <text x="75" y="112" fill="rgba(255,255,255,0.8)" font-size="8" text-anchor="middle">PDF, HTML, MD</text>
  <text x="75" y="124" fill="rgba(255,255,255,0.8)" font-size="8" text-anchor="middle">Code, Docs, DB</text>

  <line x1="130" y1="105" x2="155" y2="105" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Parsing -->
  <rect x="160" y="75" width="100" height="60" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="97" fill="#e0e0e0" font-size="10" text-anchor="middle">Parsing</text>
  <text x="210" y="112" fill="#888" font-size="8" text-anchor="middle">Extract text</text>
  <text x="210" y="124" fill="#888" font-size="8" text-anchor="middle">Clean, normalize</text>

  <line x1="265" y1="105" x2="290" y2="105" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Chunking -->
  <rect x="295" y="75" width="110" height="60" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="350" y="95" fill="#4ecdc4" font-size="10" font-weight="bold" text-anchor="middle">Chunking</text>
  <text x="350" y="110" fill="#888" font-size="8" text-anchor="middle">Recursive / Semantic</text>
  <text x="350" y="122" fill="#888" font-size="8" text-anchor="middle">~512 tokens + overlap</text>

  <line x1="410" y1="105" x2="435" y2="105" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Embedding -->
  <rect x="440" y="75" width="110" height="60" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="495" y="95" fill="#8b5cf6" font-size="10" font-weight="bold" text-anchor="middle">Embedding</text>
  <text x="495" y="110" fill="#888" font-size="8" text-anchor="middle">text-embedding-3</text>
  <text x="495" y="122" fill="#888" font-size="8" text-anchor="middle">768-3072 dims</text>

  <line x1="555" y1="105" x2="580" y2="105" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Vector DB Store -->
  <rect x="585" y="75" width="110" height="60" rx="8" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="640" y="95" fill="#1a1a2e" font-size="10" font-weight="bold" text-anchor="middle">Vector DB</text>
  <text x="640" y="110" fill="#1a1a2e" font-size="8" text-anchor="middle">Pinecone / Qdrant</text>
  <text x="640" y="122" fill="#1a1a2e" font-size="8" text-anchor="middle">Chroma / pgvector</text>

  <!-- Metadata store -->
  <rect x="710" y="75" width="90" height="60" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>
  <text x="755" y="97" fill="#e0e0e0" font-size="9" text-anchor="middle">Metadata</text>
  <text x="755" y="112" fill="#888" font-size="8" text-anchor="middle">Source, date</text>
  <text x="755" y="124" fill="#888" font-size="8" text-anchor="middle">Section, tags</text>

  <!-- Chunking strategies detail -->
  <rect x="25" y="148" width="780" height="38" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="0.5"/>
  <text x="35" y="163" fill="#888" font-size="9" font-weight="bold">Chunking strategies:</text>
  <text x="160" y="163" fill="#e0e0e0" font-size="9">Fixed-size</text>
  <text x="240" y="163" fill="#888" font-size="9">|</text>
  <text x="260" y="163" fill="#e0e0e0" font-size="9">Recursive (by separators)</text>
  <text x="420" y="163" fill="#888" font-size="9">|</text>
  <text x="440" y="163" fill="#4ecdc4" font-size="9" font-weight="bold">Semantic (by meaning shift)</text>
  <text x="630" y="163" fill="#888" font-size="9">|</text>
  <text x="650" y="163" fill="#e0e0e0" font-size="9">Agentic (LLM-guided)</text>
  <text x="35" y="178" fill="#888" font-size="8">Key params: chunk_size (512), chunk_overlap (50-100), parent-child linking for context preservation</text>

  <!-- ========== QUERY PIPELINE (Bottom) ========== -->
  <rect x="10" y="205" width="800" height="245" rx="10" fill="#1a1a2e" opacity="0.25" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="25" y="225" fill="#e07a3a" font-size="12" font-weight="bold">QUERY PIPELINE</text>
  <text x="165" y="225" fill="#888" font-size="9">(online, per-request)</text>

  <!-- User Query -->
  <rect x="25" y="240" width="100" height="50" rx="8" fill="#e07a3a" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="75" y="262" fill="#fff" font-size="10" font-weight="bold" text-anchor="middle">User Query</text>
  <text x="75" y="276" fill="rgba(255,255,255,0.8)" font-size="8" text-anchor="middle">Natural language</text>

  <line x1="130" y1="265" x2="155" y2="265" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Query Processing -->
  <rect x="160" y="235" width="115" height="60" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="217" y="255" fill="#e0e0e0" font-size="10" text-anchor="middle">Query Processing</text>
  <text x="217" y="270" fill="#888" font-size="8" text-anchor="middle">Rewrite / Expand</text>
  <text x="217" y="282" fill="#888" font-size="8" text-anchor="middle">HyDE / Multi-query</text>

  <!-- Hybrid Search -->
  <line x1="280" y1="255" x2="310" y2="255" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>
  <line x1="280" y1="275" x2="310" y2="275" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Vector Search -->
  <rect x="315" y="235" width="120" height="28" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="375" y="253" fill="#8b5cf6" font-size="9" font-weight="bold" text-anchor="middle">Vector Search</text>

  <!-- BM25 Search -->
  <rect x="315" y="268" width="120" height="28" rx="6" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="375" y="286" fill="#4ecdc4" font-size="9" font-weight="bold" text-anchor="middle">BM25 (Keyword)</text>

  <!-- Connection to Vector DB above -->
  <path d="M 640 140 L 640 165 Q 640 175 630 175 L 380 175 Q 370 175 370 185 L 370 232" stroke="#888" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#rp-arrowg)"/>

  <!-- Merge arrows -->
  <line x1="440" y1="250" x2="465" y2="260" stroke="#888" stroke-width="1.5" marker-end="url(#rp-arrowg)"/>
  <line x1="440" y1="282" x2="465" y2="272" stroke="#888" stroke-width="1.5" marker-end="url(#rp-arrowg)"/>

  <!-- RRF Scoring -->
  <rect x="470" y="245" width="110" height="40" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="525" y="263" fill="#e07a3a" font-size="9" font-weight="bold" text-anchor="middle">RRF Scoring</text>
  <text x="525" y="276" fill="#888" font-size="8" text-anchor="middle">1/(k + rank)</text>

  <line x1="585" y1="265" x2="610" y2="265" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Reranking -->
  <rect x="615" y="240" width="90" height="50" rx="8" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="660" y="260" fill="#fff" font-size="9" font-weight="bold" text-anchor="middle">Reranker</text>
  <text x="660" y="275" fill="rgba(255,255,255,0.8)" font-size="8" text-anchor="middle">Cross-encoder</text>

  <line x1="710" y1="265" x2="730" y2="265" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Top-K -->
  <rect x="735" y="245" width="60" height="40" rx="8" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1.5"/>
  <text x="765" y="263" fill="#e0e0e0" font-size="9" text-anchor="middle">Top-K</text>
  <text x="765" y="276" fill="#888" font-size="8" text-anchor="middle">k=5-10</text>

  <!-- Arrow down to generation -->
  <path d="M 765 290 L 765 310 Q 765 320 755 320 L 420 320 Q 410 320 410 330 L 410 340" stroke="#e07a3a" stroke-width="2" fill="none" marker-end="url(#rp-arrow)"/>

  <!-- Generation Section -->
  <rect x="25" y="305" width="370" height="130" rx="8" fill="#1a1a2e" opacity="0.4" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="210" y="325" fill="#8b5cf6" font-size="11" font-weight="bold" text-anchor="middle">GENERATION</text>

  <!-- Prompt Assembly -->
  <rect x="40" y="340" width="150" height="45" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="115" y="358" fill="#e0e0e0" font-size="9" text-anchor="middle">Prompt Assembly</text>
  <text x="115" y="372" fill="#888" font-size="8" text-anchor="middle">System + Context + Query</text>

  <line x1="195" y1="362" x2="215" y2="362" stroke="#888" stroke-width="1.5" marker-end="url(#rp-arrowg)"/>

  <!-- LLM -->
  <rect x="220" y="340" width="80" height="45" rx="8" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="360" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">LLM</text>
  <text x="260" y="374" fill="rgba(255,255,255,0.8)" font-size="8" text-anchor="middle">Generate</text>

  <line x1="305" y1="362" x2="325" y2="362" stroke="#888" stroke-width="1.5" marker-end="url(#rp-arrowg)"/>

  <!-- Citation -->
  <rect x="330" y="340" width="55" height="45" rx="8" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
  <text x="357" y="360" fill="#4ecdc4" font-size="9" text-anchor="middle">Cite</text>
  <text x="357" y="374" fill="#888" font-size="8" text-anchor="middle">Sources</text>

  <!-- Response -->
  <rect x="420" y="340" width="120" height="50" rx="8" fill="#4ecdc4" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="480" y="362" fill="#1a1a2e" font-size="11" font-weight="bold" text-anchor="middle">Response</text>
  <text x="480" y="377" fill="#1a1a2e" font-size="8" text-anchor="middle">Answer + Citations</text>

  <line x1="390" y1="362" x2="415" y2="362" stroke="#e07a3a" stroke-width="2" marker-end="url(#rp-arrow)"/>

  <!-- Evaluation box -->
  <rect x="560" y="305" width="240" height="130" rx="8" fill="#1a1a2e" opacity="0.4" stroke="#888" stroke-width="1.5"/>
  <text x="680" y="325" fill="#888" font-size="11" font-weight="bold" text-anchor="middle">EVALUATION METRICS</text>

  <rect x="575" y="335" width="105" height="25" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="627" y="352" fill="#e0e0e0" font-size="9" text-anchor="middle">Faithfulness</text>

  <rect x="690" y="335" width="100" height="25" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="740" y="352" fill="#e0e0e0" font-size="9" text-anchor="middle">Relevance</text>

  <rect x="575" y="367" width="105" height="25" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="627" y="384" fill="#e0e0e0" font-size="9" text-anchor="middle">Recall@K</text>

  <rect x="690" y="367" width="100" height="25" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="740" y="384" fill="#e0e0e0" font-size="9" text-anchor="middle">MRR / NDCG</text>

  <rect x="575" y="399" width="215" height="25" rx="6" fill="#1a1a2e" stroke="#e07a3a" stroke-width="1"/>
  <text x="682" y="416" fill="#e07a3a" font-size="9" text-anchor="middle">RAGAS / DeepEval / LLM-as-Judge</text>

  <!-- Hybrid search label -->
  <rect x="308" y="300" width="140" height="18" rx="9" fill="#e07a3a" opacity="0.15" stroke="#e07a3a" stroke-width="0.5"/>
  <text x="378" y="312" fill="#e07a3a" font-size="8" font-weight="bold" text-anchor="middle">HYBRID SEARCH = Vector + BM25</text>
</svg>