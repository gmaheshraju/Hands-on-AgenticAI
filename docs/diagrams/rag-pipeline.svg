<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 6 4" refX="6" refY="2" markerWidth="6" markerHeight="4" orient="auto">
      <path d="M0 0 L6 2 L0 4z" fill="#d1d5db"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="400" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Phase labels -->
  <text x="200" y="28" fill="#6b7280" font-size="10" letter-spacing="0.05em" text-anchor="middle">INGESTION</text>
  <text x="620" y="28" fill="#6b7280" font-size="10" letter-spacing="0.05em" text-anchor="middle">QUERY</text>

  <!-- Vertical dashed divider — upper segment -->
  <line x1="410" y1="38" x2="410" y2="220" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Vertical dashed divider — lower segment -->
  <line x1="410" y1="310" x2="410" y2="370" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ==================== LEFT HALF — INGESTION ==================== -->

  <!-- 1. Documents pill -->
  <rect x="150" y="52" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Document icon: tiny rect with folded corner -->
  <path d="M160 60 L160 74 L170 74 L170 64 L166 60 Z" fill="none" stroke="#6b7280" stroke-width="0.8"/>
  <path d="M166 60 L166 64 L170 64" fill="none" stroke="#6b7280" stroke-width="0.8"/>
  <text x="207" y="71" fill="#1f2937" font-size="11" text-anchor="middle">Documents</text>

  <!-- Dot at bottom of Documents -->
  <circle cx="200" cy="82" r="2" fill="#d1d5db"/>
  <!-- Arrow Documents -> Parse -->
  <path d="M200 84 C200 94 200 98 200 108" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 2. Parse pill -->
  <rect x="150" y="112" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="200" y="131" fill="#1f2937" font-size="11" text-anchor="middle">Parse</text>

  <!-- Dot at bottom of Parse -->
  <circle cx="200" cy="142" r="2" fill="#d1d5db"/>
  <!-- Arrow Parse -> Chunk -->
  <path d="M200 144 C200 154 200 158 200 168" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 3. Chunk pill -->
  <rect x="150" y="172" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="200" y="191" fill="#1f2937" font-size="11" text-anchor="middle">Chunk</text>

  <!-- Dot at bottom of Chunk -->
  <circle cx="200" cy="202" r="2" fill="#d1d5db"/>
  <!-- Arrow Chunk -> Embed -->
  <path d="M200 204 C200 214 200 218 200 228" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 4. Embed pill -->
  <rect x="150" y="232" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="200" y="251" fill="#1f2937" font-size="11" text-anchor="middle">Embed</text>

  <!-- Dot at right of Embed -->
  <circle cx="250" cy="247" r="2" fill="#d1d5db"/>
  <!-- Arrow Embed -> Vector DB (curves right) -->
  <path d="M252 247 C290 247 310 260 340 265" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- ==================== CENTER — VECTOR DB (HERO) ==================== -->

  <!-- Outer rect -->
  <rect x="340" y="240" width="140" height="50" rx="8" fill="#fff" stroke="#d4622b" stroke-width="1.5"/>
  <!-- Inner inset rect for double-border effect -->
  <rect x="344" y="244" width="132" height="42" rx="6" fill="none" stroke="#d4622b" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Database dots above text -->
  <circle cx="400" cy="254" r="1.5" fill="#d4622b" opacity="0.5"/>
  <circle cx="410" cy="254" r="1.5" fill="#d4622b" opacity="0.5"/>
  <circle cx="420" cy="254" r="1.5" fill="#d4622b" opacity="0.5"/>

  <!-- Vector DB text -->
  <text x="410" y="273" fill="#d4622b" font-size="13" font-weight="600" text-anchor="middle">Vector DB</text>

  <!-- ==================== RIGHT HALF — QUERY ==================== -->

  <!-- 1. Query pill -->
  <rect x="560" y="52" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Magnifying glass icon -->
  <circle cx="576" cy="65" r="4" fill="none" stroke="#6b7280" stroke-width="0.8"/>
  <line x1="579" y1="68" x2="583" y2="72" stroke="#6b7280" stroke-width="0.8"/>
  <text x="617" y="71" fill="#1f2937" font-size="11" text-anchor="middle">Query</text>

  <!-- Dot at bottom of Query -->
  <circle cx="610" cy="82" r="2" fill="#d1d5db"/>
  <!-- Arrow Query -> Embed -->
  <path d="M610 84 C610 94 610 98 610 108" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 2. Embed pill -->
  <rect x="560" y="112" width="100" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="131" fill="#1f2937" font-size="11" text-anchor="middle">Embed</text>

  <!-- Dot at bottom of Embed -->
  <circle cx="610" cy="142" r="2" fill="#d1d5db"/>
  <!-- Arrow Embed -> Hybrid Search -->
  <path d="M610 144 C610 154 610 158 610 168" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 3. Hybrid Search pill (wider) -->
  <rect x="548" y="172" width="124" height="30" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="190" fill="#1f2937" font-size="11" text-anchor="middle">Hybrid Search</text>
  <!-- Sub-labels -->
  <text x="585" y="210" fill="#6b7280" font-size="8" text-anchor="middle">Vector</text>
  <text x="635" y="210" fill="#6b7280" font-size="8" text-anchor="middle">BM25</text>

  <!-- Arrow from Vector DB -> Hybrid Search (curves left from DB) -->
  <circle cx="480" cy="260" r="2" fill="#d1d5db"/>
  <path d="M480 258 C520 240 560 220 580 202" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- Dot at bottom of Hybrid Search -->
  <circle cx="610" cy="218" r="2" fill="#d1d5db"/>
  <!-- Arrow Hybrid Search -> RRF Score -->
  <path d="M610 220 C610 228 610 232 610 238" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 4. RRF Score pill -->
  <rect x="560" y="242" width="100" height="26" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="259" fill="#1f2937" font-size="11" text-anchor="middle">RRF Score</text>

  <!-- Dot at bottom of RRF Score -->
  <circle cx="610" cy="268" r="2" fill="#d1d5db"/>
  <!-- Arrow RRF -> Rerank -->
  <path d="M610 270 C610 278 610 280 610 286" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 5. Rerank pill -->
  <rect x="560" y="290" width="100" height="26" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="307" fill="#1f2937" font-size="11" text-anchor="middle">Rerank</text>

  <!-- Dot at bottom of Rerank -->
  <circle cx="610" cy="316" r="2" fill="#d1d5db"/>
  <!-- Arrow Rerank -> LLM -->
  <path d="M610 318 C610 324 610 326 610 332" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 6. LLM pill (orange accent) -->
  <rect x="560" y="336" width="100" height="26" rx="12" fill="#fff" stroke="#d4622b" stroke-width="1"/>
  <text x="610" y="353" fill="#1f2937" font-size="11" font-weight="600" text-anchor="middle">LLM</text>

  <!-- Dot at bottom of LLM -->
  <circle cx="610" cy="362" r="2" fill="#d1d5db"/>
  <!-- Arrow LLM -> Response -->
  <path d="M610 364 C610 368 610 370 610 374" stroke="#d1d5db" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 7. Response pill -->
  <rect x="560" y="378" width="100" height="20" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="392" fill="#1f2937" font-size="10" text-anchor="middle">Response</text>

  <!-- ==================== BOTTOM — EVALUATION METRICS ==================== -->

  <!-- Faithfulness -->
  <rect x="120" y="378" width="80" height="18" rx="9" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="160" y="390" fill="#6b7280" font-size="8" text-anchor="middle">Faithfulness</text>

  <!-- Dot between -->
  <circle cx="214" cy="387" r="1.5" fill="#d1d5db"/>

  <!-- Relevance -->
  <rect x="228" y="378" width="72" height="18" rx="9" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="264" y="390" fill="#6b7280" font-size="8" text-anchor="middle">Relevance</text>

  <!-- Dot between -->
  <circle cx="314" cy="387" r="1.5" fill="#d1d5db"/>

  <!-- Recall@K -->
  <rect x="328" y="378" width="68" height="18" rx="9" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="362" y="390" fill="#6b7280" font-size="8" text-anchor="middle">Recall@K</text>
</svg>