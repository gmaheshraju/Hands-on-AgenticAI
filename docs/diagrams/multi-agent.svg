<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowRight" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowRightGray" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#d1d5db"/>
    </marker>
    <marker id="arrowUp" markerWidth="4" markerHeight="6" refX="2" refY="0" orient="auto">
      <path d="M0,6 L2,0 L4,6 Z" fill="#d1d5db"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="400" fill="#fafafa" stroke="#e5e7eb" stroke-width="1" rx="12"/>

  <!-- ═══ LEFT SIDE — Vertical progression arrow ═══ -->
  <line x1="40" y1="350" x2="40" y2="55" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrowUp)"/>
  <!-- "Complexity" label rotated -->
  <text x="18" y="210" font-size="9" fill="#6b7280" text-anchor="middle" transform="rotate(-90, 18, 210)">Complexity</text>
  <!-- Tick marks at each level -->
  <line x1="35" y1="340" x2="45" y2="340" stroke="#d1d5db" stroke-width="1"/>
  <line x1="35" y1="250" x2="45" y2="250" stroke="#d1d5db" stroke-width="1"/>
  <line x1="35" y1="160" x2="45" y2="160" stroke="#d1d5db" stroke-width="1"/>
  <line x1="35" y1="70" x2="45" y2="70" stroke="#d1d5db" stroke-width="1"/>

  <!-- ═══ LEVEL 1 — Single Agent (y ~310-360) ═══ -->
  <rect x="60" y="310" width="740" height="60" fill="#fafbfc" rx="6" stroke="none"/>
  <!-- L1 circle -->
  <circle cx="80" cy="340" r="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="343" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">L1</text>
  <!-- Agent circle -->
  <circle cx="200" cy="340" r="16" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
  <text x="200" y="344" font-size="10" fill="#1f2937" text-anchor="middle">Agent</text>
  <!-- Connecting lines to tools -->
  <line x1="216" y1="340" x2="258" y2="325" stroke="#d1d5db" stroke-width="0.75"/>
  <line x1="216" y1="340" x2="258" y2="340" stroke="#d1d5db" stroke-width="0.75"/>
  <line x1="216" y1="340" x2="258" y2="355" stroke="#d1d5db" stroke-width="0.75"/>
  <!-- Tool dots -->
  <circle cx="264" cy="325" r="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.75"/>
  <circle cx="264" cy="340" r="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.75"/>
  <circle cx="264" cy="355" r="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.75"/>
  <text x="280" y="343" font-size="8" fill="#6b7280">tools</text>
  <!-- Use-case -->
  <text x="740" y="344" font-size="9" fill="#6b7280" font-style="italic" text-anchor="end">chatbots</text>

  <!-- ═══ LEVEL 2 — Pipeline (y ~220-270) ═══ -->
  <rect x="60" y="220" width="740" height="60" fill="#fafbfc" rx="6" stroke="none"/>
  <!-- L2 circle -->
  <circle cx="80" cy="250" r="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="253" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">L2</text>
  <!-- Pipeline: A → B → C -->
  <circle cx="160" cy="250" r="14" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="160" y="254" font-size="10" fill="#1f2937" text-anchor="middle">A</text>
  <line x1="174" y1="250" x2="226" y2="250" stroke="#7c3aed" stroke-width="0.75" marker-end="url(#arrowRight)"/>
  <circle cx="240" cy="250" r="14" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="240" y="254" font-size="10" fill="#1f2937" text-anchor="middle">B</text>
  <line x1="254" y1="250" x2="306" y2="250" stroke="#7c3aed" stroke-width="0.75" marker-end="url(#arrowRight)"/>
  <circle cx="320" cy="250" r="14" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="320" y="254" font-size="10" fill="#1f2937" text-anchor="middle">C</text>
  <!-- Use-case -->
  <text x="740" y="254" font-size="9" fill="#6b7280" font-style="italic" text-anchor="end">pipelines</text>

  <!-- ═══ LEVEL 3 — Teams (y ~130-180) ═══ -->
  <rect x="60" y="125" width="740" height="70" fill="#fafbfc" rx="6" stroke="none"/>
  <!-- L3 circle -->
  <circle cx="80" cy="160" r="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="163" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">L3</text>
  <!-- Supervisor -->
  <circle cx="220" cy="142" r="16" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="220" y="146" font-size="9" fill="#1f2937" text-anchor="middle">Sup</text>
  <!-- Specialists -->
  <circle cx="170" cy="178" r="12" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="170" y="182" font-size="9" fill="#1f2937" text-anchor="middle">S1</text>
  <circle cx="220" cy="178" r="12" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="220" y="182" font-size="9" fill="#1f2937" text-anchor="middle">S2</text>
  <circle cx="270" cy="178" r="12" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <text x="270" y="182" font-size="9" fill="#1f2937" text-anchor="middle">S3</text>
  <!-- Lines from Supervisor to each specialist -->
  <line x1="210" y1="156" x2="176" y2="168" stroke="#7c3aed" stroke-width="0.75"/>
  <line x1="220" y1="158" x2="220" y2="166" stroke="#7c3aed" stroke-width="0.75"/>
  <line x1="230" y1="156" x2="264" y2="168" stroke="#7c3aed" stroke-width="0.75"/>
  <!-- Annotation pill -->
  <rect x="310" y="150" width="110" height="18" fill="#f3f4f6" rx="6" stroke="none"/>
  <text x="365" y="163" font-size="8" fill="#6b7280" text-anchor="middle">fear being wrong</text>
  <!-- Use-case -->
  <text x="740" y="163" font-size="9" fill="#6b7280" font-style="italic" text-anchor="end">coding agents</text>

  <!-- ═══ LEVEL 4 — Swarm (y ~30-100) ═══ -->
  <rect x="60" y="30" width="740" height="80" fill="#fafbfc" rx="6" stroke="none"/>
  <!-- L4 circle -->
  <circle cx="80" cy="70" r="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="73" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">L4</text>

  <!-- Mesh network — 6 nodes in organic arrangement -->
  <circle cx="140" cy="55" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <circle cx="178" cy="42" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <circle cx="216" cy="56" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <circle cx="148" cy="84" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <circle cx="192" cy="90" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>
  <circle cx="234" cy="80" r="10" fill="#fff" stroke="#7c3aed" stroke-width="0.75"/>

  <!-- Mesh connections — organic interconnections -->
  <line x1="149" y1="51" x2="169" y2="46" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="187" y1="46" x2="207" y2="53" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="145" y1="64" x2="148" y2="74" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="150" y1="55" x2="206" y2="56" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="157" y1="84" x2="183" y2="88" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="201" y1="88" x2="225" y2="83" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="222" y1="64" x2="230" y2="71" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="178" y1="52" x2="153" y2="76" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="186" y1="48" x2="230" y2="72" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="197" y1="82" x2="213" y2="64" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="154" y1="78" x2="186" y2="84" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="178" y1="52" x2="192" y2="80" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="140" y1="65" x2="192" y2="80" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="216" y1="66" x2="234" y2="70" stroke="#d1d5db" stroke-width="0.5"/>

  <!-- Lines from mesh nodes to Synth -->
  <line x1="244" y1="78" x2="284" y2="72" stroke="#7c3aed" stroke-width="0.5" marker-end="url(#arrowRight)"/>
  <line x1="226" y1="56" x2="284" y2="66" stroke="#7c3aed" stroke-width="0.5" marker-end="url(#arrowRight)"/>
  <line x1="202" y1="90" x2="284" y2="74" stroke="#7c3aed" stroke-width="0.5" marker-end="url(#arrowRight)"/>

  <!-- Synth node -->
  <circle cx="296" cy="70" r="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="296" y="74" font-size="8" fill="#1f2937" text-anchor="middle">Synth</text>

  <!-- Annotation pill -->
  <rect x="326" y="61" width="130" height="18" fill="#f3f4f6" rx="6" stroke="none"/>
  <text x="391" y="74" font-size="8" fill="#6b7280" text-anchor="middle">fear missing something</text>

  <!-- Use-case -->
  <text x="740" y="74" font-size="9" fill="#6b7280" font-style="italic" text-anchor="end">deep research</text>

  <!-- ═══ Dashed progression lines between levels ═══ -->
  <line x1="80" y1="330" x2="80" y2="265" stroke="#e5e7eb" stroke-width="0.75" stroke-dasharray="3,3"/>
  <line x1="80" y1="240" x2="80" y2="175" stroke="#e5e7eb" stroke-width="0.75" stroke-dasharray="3,3"/>
  <line x1="80" y1="150" x2="80" y2="85" stroke="#e5e7eb" stroke-width="0.75" stroke-dasharray="3,3"/>
</svg>